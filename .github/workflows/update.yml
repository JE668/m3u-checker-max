name: Update IPTV Links

on:
  push:
    branches: [ "main" ]  # 当你推送代码到 main 分支时触发
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

# 🌟 新增：并发控制，如果连续触发两次，自动取消前一次（或排队），防止冲突
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # 获取完整历史以防变基失败

      - name: 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 运行核心检测脚本
        run: python main.py

      - name: 提交并推送到仓库
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add live.txt live.m3u epg.xml epg.xml.gz log.txt
          
          # 检查是否有文件变更
          if ! git diff --staged --quiet; then
            git commit -m "Auto Update IPTV Sources: $(date +'%Y-%m-%d %H:%M')"
            
            # 🌟 新增：在推送到远程之前，先拉取最新代码并变基，完美解决冲突报错
            git pull --rebase origin main
            git push
          else
            echo "没有发现文件更改，跳过提交。"
          fi
